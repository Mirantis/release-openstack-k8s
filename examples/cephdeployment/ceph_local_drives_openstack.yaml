apiVersion: lcm.mirantis.com/v1alpha1
kind: CephDeployment
metadata:
  name: cephcluster
  namespace: ceph-lcm-mirantis
spec:
  blockStorage:
    pools:
    - name: mirablock-k8s-block
      role: kubernetes
      storageClassOpts:
        default: true
      spec:
        deviceClass: hdd
        replicated:
          size: 2
    - name: volumes
      role: volumes
      spec:
        deviceClass: hdd
        replicated:
          size: 2
    - name: vms
      role: vms
      spec:
        deviceClass: hdd
        replicated:
          size: 2
    - name: backup
      role: backup
      spec:
        deviceClass: hdd
        replicated:
          size: 2
    - name: images
      role: images
      spec:
        deviceClass: hdd
        replicated:
          size: 2
  cluster:
    dashboard:
      enabled: false
    network:
      addressRanges:
        cluster: ["10.11.0.0/24"]
        public: ["10.12.0.0/24"]
  nodes:
    - name: Values.CHANGE_ME_node1_name
      devices:
        - name: sdb
          config:
            deviceClass: hdd
      roles: [mon, mgr]
    - name: Values.CHANGE_ME_node2_name
      devices:
        - name: sdb
          config:
            deviceClass: hdd
      roles: [mon, mgr]
    - name: Values.CHANGE_ME_node3_name
      devices:
        - name: sdb
          config:
            deviceClass: hdd
      roles: [mon, mgr]
  objectStorage:
    objectStores:
      - name: openstack-store
        # w/a until moved to envoy
        usedByRockoon: true
        spec:
          metadataPool:
            failureDomain: host
            deviceClass: hdd
            replicated:
              size: 2
          dataPool:
            deviceClass: hdd
            failureDomain: host
            replicated:
              size: 2
          gateway:
            # NOTE(vsaienko): rgw do not have synchronization, use 1 replica
            # to avoid races in tests.
            instances: 1
            port: 80
            securePort: 8443
          preservePoolsOnDelete: false
  rookConfig:
    # IMPORTANT: for production change to 3 or remove.
    osd_pool_default_size: "2"
